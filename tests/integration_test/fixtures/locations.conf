worker_processes 1;

events {
    worker_connections 256;
}

http {
    server {
        listen 8080;
        server_name locations.test;

        location / {
            root /var/www/html;
        }

        location = /favicon.ico {
            root /var/www/static;
        }

        location ^~ /api {
            proxy_pass http://127.0.0.1:9000;
        }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
        }
    }
}
